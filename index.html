<!DOCTYPE html>

<body>
  <header>
    <h1 class="title">ものおき（仮）</h1>
  </header>
  <div class="page-info">
    <p class="description">いろいろ作ったものを置いてます。</p>
  </div>

  <main class="container">
    <nav>
      <h2>目次</h2>
      <ul>
        <li><a href="#tools">作成したツールとか</a></li>
      </ul>
    </nav>
    <section id="tools">
      <h2>作成したツールとか</h2>
      <p>練習のために何か生活に役立つようなツールを作成したり…</p>
      <div class="menu">
        <div class="item">
          <dl>
            <dt>TODOリスト</dt>
            <dd>
              ちょっとした内容をメモとして残せるTODOリストです。<br>
              メモした内容はブラウザ内に保存されます。ブックマークしておくと使いやすいかも。
              <a href="todo_list.html">使ってみる</a>
            </dd>
          </dl>
        </div>
      <div class="menu">
        <div class="item">
          <dl>
            <dt>新NISA向け　複利計算シミュレータ（仮）</dt>
            <dd>
              新NISAでの貯蓄計画のための簡易シミュレータ。<br>
              複利で毎月どの程度増えていくかを計算したり…<br>
              <a href="nisa_simulator.html">使ってみる</a>
            </dd>
          </dl>
        </div>
        <div class="item">
          <dl>
            <dt>暗号化ツール（AES / 3DES）</dt>
            <dd>
              文字列を暗号化するツール。<br>
              ちょっと試してみたい時などに<br>
              <a href="crypto_encoder.html">使ってみる</a>
            </dd>
          </dl>
        </div>
      </div>
    </section>

  <script src="js/base.js"></script>
