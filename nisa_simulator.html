<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NISA積立シミュレーション</title>
  <link rel="stylesheet" href="css/base_style.css">
  <link rel="stylesheet" href="css/nisa_simulation.css">
</head>

<body>
  <header>
    <h1 class="title"><a href="index.html">ものおき（仮）</a></h1>
  </header>
  <div class="page-info">
    <h2 class="title">NISA 積立シミュレーション</h1>
    <p class="description">
      新NISA向けに積立投資の評価額がどんな感じに増えていくかを計算します。
    </p>
  </div>

  <main class="container">
    <div>
      <label>ひと月の積立額：
        <input type="number" id="monthly" value="30000">
      </label><br><br>

      <label>開始年月：
        <input type="month" id="startMonth" value="2025-01">
      </label><br><br>

      <label>想定年間利回り（%）：
        <input type="number" id="annualRate" value="5" step="0.1">
      </label><br><br>

      <label>シミュレーション年数：
        <input type="number" id="years" value="20">
      </label><br><br>

      <button id="simulate">計算する</button>
    </div>

    <table id="resultTable">
      <thead>
        <tr>
          <th>年月</th>
          <th>累計積立額</th>
          <th>評価額</th>
          <th>利益</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </main>

  <script src="js/nisa_simulation.js"></script>
</body>

</html>
