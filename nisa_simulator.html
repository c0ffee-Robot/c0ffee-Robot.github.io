<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新NISA（積立枠）向け　複利計算シミュレータ</title>
  <link rel="stylesheet" href="css/base_style.css">
  <link rel="stylesheet" href="css/nisa_simulation.css">
</head>

<body>
  <header>
    <h1 class="title"><a href="index.html">ものおき（仮）</a></h1>
  </header>
  <div class="page-info">
    <h2 class="title">新NISA（積立枠）向け　複利計算シミュレータ</h1>
      <p class="description">
        新NISAの積立枠がどんな感じに増えていくかを計算します。<br>
        積立枠の上限は1080万とし、上限に達した場合は追加の積み立てはせずに想定利回りだけで運用する計算にしています。
      </p>
  </div>

  <main class="container">
    <div class="input-form">
      <label for="monthly">ひと月の積立額：</label>
      <input id="monthly" type="number" value="30000">
    </div>
    <div class="input-form">
      <label for="startMonth">開始年月：</label>
      <input id="startMonth" type="month" value="2025-01">
    </div>
    <div class="input-form">
      <label for="annualRate">想定年間利回り（%）：</label>
      <input id="annualRate" type="number" value="5" step="0.1">
    </div>
    <div class="input-form">
      <label for="years">シミュレーション年数：</label>
      <input id="years" type="number" value="20">
    </div>

    <button id="simulate">計算する</button>

    <table id="resultTable">
      <thead>
        <tr>
          <th>年月</th>
          <th>累計積立額</th>
          <th>評価額</th>
          <th>利益</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </main>

  <script src="js/nisa_simulation.js"></script>
</body>

</html>
